<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Gastos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 380px;
            width: 100%;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-top: 0;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .campo {
            display: flex;
            flex-direction: column;
        }

        .campo label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        .campo input {
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .botao-entrar {
            padding: 12px;
            border: none;
            border-radius: 5px;
            background-color: #1f6feb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .botao-entrar:hover {
            opacity: 0.9;
        }

        .mensagem {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #d93025;
        }

        .link-cadastro {
            margin-top: 20px;
            text-align: center;
        }

        .link-cadastro a {
            color: #1f6feb;
            text-decoration: none;
        }

        .link-cadastro a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Entrar</h1>

        <form id="form-login">

            <div class="campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" required>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" required>
            </div>

            <button type="submit" class="botao-entrar">
                Entrar
            </button>

        </form>

        <p id="mensagem" class="mensagem"></p>

        <p class="link-cadastro">
            Não tem conta? <a href="cadastro.html">Cadastre-se</a>
        </p>

    </div>

    <script>
        const API_URL = "http://127.0.0.1:5000";

        // Se já estiver logado, vai direto pra tela principal
        if (localStorage.getItem("id_usuario")) {
            window.location.href = "index.html";
        }

        const formulario = document.getElementById("form-login");
        const email = document.getElementById("email");
        const senha = document.getElementById("senha");
        const mensagem = document.getElementById("mensagem");

        formulario.addEventListener("submit", async function (evento) {
            evento.preventDefault();

            mensagem.textContent = "Entrando...";

            try {
                const resposta = await fetch(`${API_URL}/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: email.value,
                        senha: senha.value
                    })
                });

                const resultado = await resposta.json();

                if (!resposta.ok) {
                    throw new Error(resultado.erro || "Não foi possível entrar.");
                }

                localStorage.setItem("id_usuario", resultado.id_usuario);
                localStorage.setItem("nome_usuario", resultado.nome);

                window.location.href = "index.html";

            } catch (erro) {
                mensagem.textContent = erro.message;
                console.error(erro);
            }
        });
    </script>

</body>
</html>
